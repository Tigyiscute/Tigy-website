<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ghost-Obfuscator | Roblox Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/editor/editor.main.min.css">
    <style>
        body { background-color: #0f172a; color: white; }
        #editor { height: 500px; border-radius: 8px; overflow: hidden; }
    </style>
</head>
<body class="p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold text-blue-400">GHOST-OBF</h1>
                <p class="text-slate-400">Multi-layered Luau Protection</p>
            </div>
            <button onclick="runObfuscation()" class="bg-blue-600 hover:bg-blue-500 px-8 py-3 rounded-lg font-bold transition-all transform active:scale-95">
                OBFUSCATE SCRIPT
            </button>
        </header>

        <div id="editor" class="shadow-2xl shadow-blue-900/20"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="obfuscator.js"></script>
</body>
</html>
