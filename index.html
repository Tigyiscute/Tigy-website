<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghost-Obf | Advanced Roblox Protection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/editor/editor.main.min.css">
    <style>
        body { background-color: #020617; color: #f8fafc; font-family: 'Inter', sans-serif; }
        #editor { 
            height: 600px; 
            border: 1px solid #1e293b;
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }
        .glass { background: rgba(30, 41, 59, 0.5); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="p-4 md:p-12">
    <div class="max-w-6xl mx-auto">
        <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
            <div>
                <h1 class="text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-400">
                    GHOST-OBF
                </h1>
                <p class="text-slate-400 font-medium">Multi-Layer Luau Virtualization & Protection</p>
            </div>
            
            <div class="flex gap-3">
                <button onclick="runObfuscation()" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-bold transition-all hover:scale-105 active:scale-95 shadow-lg shadow-blue-900/40">
                    OBFUSCATE
                </button>
                <button onclick="copyToClipboard()" class="bg-slate-800 hover:bg-slate-700 text-white px-6 py-3 rounded-xl font-bold transition-all border border-slate-700">
                    COPY CODE
                </button>
            </div>
        </header>

        <div class="relative">
            <div id="editor"></div>
        </div>

        <footer class="mt-6 text-center text-slate-500 text-sm">
            <p>Protection Layers: Byte-Stash v2, Junk-Injection, Lexical-Wrap</p>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.36.1/min/vs/loader.min.js"></script>
    <script src="obfuscator.js"></script>
</body>
</html>
